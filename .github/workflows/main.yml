name: "Godot iOS Single-Process Build"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: "1. Checkout Source Code"
        uses: actions/checkout@v4
        with:
          repository: godotengine/godot
          ref: 4.2.1-stable

      - name: "2. Install Build Dependencies"
        run: |
          brew install scons
          python3 -m pip install scons

      - name: "3. Auto-Patch Engine (Single Process & Header Fix)"
        run: |
          python3 -c '
          import os

          # A. OS_IOS প্যাচ (সিঙ্গেল প্রসেসের জন্য)
          os_mm = "platform/ios/os_ios.mm"
          with open(os_mm, "r") as f: content = f.read()
          target = "Error OS_IOS::create_process"
          if target in content:
              dummy = "Error OS_IOS::create_process(const String &p_path, const List<String> &p_arguments, ProcessID *r_id) { return OK; }\\n/* Bypassed: */\\nError OS_IOS::_disabled"
              content = content.replace(target, dummy)
              with open(os_mm, "w") as f: f.write(content)

          # B. Vulkan Header Fix (Apple Clang এরর এড়ানোর জন্য)
          headers = ["thirdparty/vulkan/include/vulkan/vk_platform.h", "thirdparty/vulkan/include/vk_video/vulkan_video_codecs_common.h"]
          for h in headers:
              if os.path.exists(h):
                  with open(h, "r") as f: c = f.read()
                  if "#include <stdint.h>" in c:
                      c = c.replace("#include <stdint.h>", "/* Patched */")
                      c = "#include <stdint.h>\n" + c
                      with open(h, "w") as f: f.write(c)
          '

      - name: "4. Compile Engine"
        run: |
          scons platform=ios target=editor arch=arm64 tests=no -j$(sysctl -n hw.logicalcpu)

      - name: "5. Assemble Xcode Project"
        run: |
          mkdir -p build/ios
          cp -r misc/dist/ios_xcode/* build/ios/
          mkdir -p build/ios/libgodot.ios.editor.xcframework/ios-arm64
          cp bin/libgodot.ios.editor.arm64.a build/ios/libgodot.ios.editor.xcframework/ios-arm64/libgodot.a

      - name: "6. Build & Package IPA"
        run: |
          cd build/ios
          xcodebuild -project godot_ios.xcodeproj \
            -scheme "godot_ios" \
            -configuration Debug \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CONFIGURATION_BUILD_DIR="./output" \
            clean build
          
          cd output
          mkdir -p Payload
          mv *.app Payload/
          zip -r godot_ios_final.ipa Payload

      - name: "7. Upload Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: godot-ios-ipa
          path: build/ios/output/godot_ios_final.ipa
