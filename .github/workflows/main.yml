name: "Godot iOS Editor Build"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios-editor:
    runs-on: macos-latest

    env:
      GODOT_VERSION: 4.2.1-stable

    steps:
      - name: Checkout Godot Source Code
        uses: actions/checkout@v4
        with:
          repository: godotengine/godot
          ref: ${{ env.GODOT_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install SCons (Godot Build Tool)
        run: |
          python -m pip install scons

      - name: Cache SCons Build Artifacts
        uses: actions/cache@v4
        with:
          path: ~/.cache/scons
          key: scons-ios-editor-${{ env.GODOT_VERSION }}

      - name: Compile Godot Engine for iOS Editor
        run: |
          # platform=ios এবং target=editor দিয়ে আইফোনের মূল এডিটর কম্পাইল করা হচ্ছে
          # এটি bin/ ফোল্ডারে একটি স্ট্যাটিক লাইব্রেরি (.a ফাইল) তৈরি করবে
          scons platform=ios target=editor arch=arm64 tests=no -j$(sysctl -n hw.logicalcpu)

      - name: Prepare Xcode Project Template
        run: |
          # গডটের আইওএস অ্যাপ প্যাকেজিং টেমপ্লেটটি বিল্ড ডিরেক্টরিতে সেটআপ করা
          mkdir -p build/ios
          cp -r misc/dist/ios_xcode/* build/ios/
          
          # কম্পাইল হওয়া স্ট্যাটিক লাইব্রেরিটি এক্সকোড প্রজেক্টের সঠিক পাথে কপি করা
          mkdir -p build/ios/libgodot.ios.editor.xcframework/ios-arm64
          cp bin/libgodot.ios.editor.arm64.a build/ios/libgodot.ios.editor.xcframework/ios-arm64/libgodot.a

      - name: Build Xcode Project (Unsigned)
        run: |
          cd build/ios
          
          # কোড সাইনিং ছাড়া এক্সকোড প্রজেক্ট বিল্ড করা
          xcodebuild -project godot_ios.xcodeproj \
            -scheme "godot_ios" \
            -configuration Debug \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            CONFIGURATION_BUILD_DIR="./output" \
            clean build

      - name: Package to Unsigned IPA
        run: |
          cd build/ios/output
          mkdir -p Payload
          # .app ফাইলটিকে Payload ফোল্ডারে নিয়ে জিপ করা হচ্ছে
          mv *.app Payload/
          zip -r godot_editor_unsigned.ipa Payload
          rm -rf Payload

      - name: Upload Godot Editor IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: godot-editor-ios
          path: build/ios/output/godot_editor_unsigned.ipa
